<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stationary Items - P.S. Public School</title>
<style>
  body{font-family:Poppins, sans-serif;background:#f2f4f7;margin:0;padding:0}
  .topbar{width:100%;padding:15px 20px;background:#007bff;color:#fff;display:flex;align-items:center;gap:15px;box-sizing:border-box;position:sticky;top:0;z-index:4000}
  .menu-btn{font-size:28px;cursor:pointer;color:#fff;font-weight:900;}
  #sessionSelect{padding:4px 8px;border-radius:6px;border:none;font-size:14px;}
  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);display:none;z-index:1500;}
  .overlay.show{display:block;}
  .side-menu{position:fixed;top:0;left:-280px;width:260px;height:100%;background:#fff;box-shadow:2px 0 8px rgba(0,0,0,0.18);padding:20px;overflow-y:auto;z-index:2000;transition:left 0.35s;border-radius:0 18px 18px 0;}
  .side-menu.open{left:0;}
  .menu-item{padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;font-size:16px;font-weight:600;color:#333;}

  .container{max-width:980px;margin:15px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
  .card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:16px;}
  label{display:block;font-weight:600;margin-bottom:6px;}
  input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row > div{flex:1;min-width:220px;}
  .btn{padding:10px 16px;border:0;border-radius:8px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer;}
  .btn.secondary{background:#64748b;}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th,td{border:1px solid #e6e6e6;padding:8px;text-align:left;font-size:14px}
  th{background:#007bff;color:#fff}
  .actions button{margin-right:6px;}
  .pager{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .pager-info{color:#6b7280;font-size:13px;font-weight:700;}
  .pager-controls{display:flex;gap:8px;align-items:center;}
  .pager button{padding:8px 12px;border:0;border-radius:8px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer;}
  .pager button:disabled{opacity:.5;cursor:not-allowed;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">&#9776;</div>
    <div style="font-size:20px;font-weight:600;">Stationary Items</div>
    <div style="margin-left:auto; display:flex; align-items:center;">
      <select id="sessionSelect" onchange="changeSession()"></select>
    </div>
  </div>

  <div id="overlay" class="overlay" onclick="closeMenu()"></div>
  <div class="side-menu" id="sideMenu">
    <div class="menu-item" onclick="goToPage('fee_students.html')">Fee Overview</div>
    <div class="menu-item" onclick="goToPage('stationary_students.html')">Home</div>
    <div class="menu-item" onclick="goToPage('stationary_items.html')">Stationary Items</div>
    <div class="menu-item" onclick="goToPage('stationary_receipt_history.html')">Receipt History</div>
    <div class="menu-item" onclick="goToPage('stationary_fee_ledger.html')">Stationary Fee Ledger</div>
  </div>

  <div class="container">
    <div class="card">
      <div class="row">
        <div>
          <label>Item Name</label>
          <input id="itemName" placeholder="Notebook, Pen, Copy..." />
        </div>
        <div>
          <label>Price (&#8377;)</label>
          <input id="itemPrice" type="number" min="0" placeholder="0" />
        </div>
      </div>
      <div style="margin-top:12px;">
        <button class="btn" onclick="saveItem()">Save Item</button>
        <button class="btn secondary" onclick="resetForm()">Clear</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Price (&#8377;)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
    <div class="pager">
      <div class="pager-info" id="itemsPageInfo">Showing 0 items</div>
      <div class="pager-controls">
        <button type="button" id="prevItemsBtn" onclick="changeItemsPage(-1)">Previous</button>
        <button type="button" id="nextItemsBtn" onclick="changeItemsPage(1)">Next</button>
      </div>
    </div>
  </div>

<script>
const FEE_API = localStorage.getItem("apiBaseUrl") || "http://127.0.0.1:5000";
const SESSION_API = localStorage.getItem("sessionApiBaseUrl") || "https://exam-backend-117372286918.asia-south1.run.app/";
const initParams = new URLSearchParams(window.location.search);
let currentSession = initParams.get("session") || localStorage.getItem("session") || "2024_25";
localStorage.setItem("session", currentSession);
let editId = null;
let allItems = [];
let itemsPage = 1;
const ITEMS_PAGE_SIZE = 10;

function toggleMenu(){ sideMenu.classList.toggle("open"); overlay.classList.toggle("show"); }
function closeMenu(){ sideMenu.classList.remove("open"); overlay.classList.remove("show"); }
function goToPage(p){ window.location.href = p + "?session=" + encodeURIComponent(currentSession); }

async function loadSessions(){
  try{
    const res = await fetch(SESSION_API + "/session/list");
    const data = await res.json();
    const sel = document.getElementById("sessionSelect");
    sel.innerHTML = "";
    const sessions = (data.sessions && data.sessions.length) ? data.sessions : [currentSession];
    sessions.forEach(s=>{
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      if (s === currentSession) opt.selected = true;
      sel.appendChild(opt);
    });
  }catch(e){
    const sel = document.getElementById("sessionSelect");
    sel.innerHTML = `<option>${currentSession}</option>`;
  }
}

function changeSession(){
  currentSession = sessionSelect.value;
  localStorage.setItem("session", currentSession);
  itemsPage = 1;
  loadItems();
}

function resetForm(){
  editId = null;
  itemName.value = "";
  itemPrice.value = "";
}

async function saveItem(){
  const name = itemName.value.trim();
  const price = Number(itemPrice.value || 0);
  if (!name) return alert("Enter item name");

  if (editId){
    const res = await fetch(`${FEE_API}/stationary/items/${editId}`, {
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Session": currentSession},
      body: JSON.stringify({name, price})
    });
    const data = await res.json();
    if (!res.ok || !data.success) return alert(data.message || "Save failed");
  } else {
    const res = await fetch(`${FEE_API}/stationary/items`, {
      method:"POST",
      headers:{"Content-Type":"application/json","X-Session": currentSession},
      body: JSON.stringify({name, price})
    });
    const data = await res.json();
    if (!res.ok || !data.success) return alert(data.message || "Save failed");
  }

  resetForm();
  loadItems();
}

async function loadItems(){
  const res = await fetch(`${FEE_API}/stationary/items`, {headers:{"X-Session": currentSession}});
  const data = await res.json();
  allItems = data.items || [];
  renderItems();
}

function renderItems(){
  const tbody = document.getElementById("itemsBody");
  const totalPages = Math.max(1, Math.ceil(allItems.length / ITEMS_PAGE_SIZE));
  if (itemsPage > totalPages) itemsPage = totalPages;
  const start = (itemsPage - 1) * ITEMS_PAGE_SIZE;
  const rows = allItems.slice(start, start + ITEMS_PAGE_SIZE);

  if (!rows.length){
    tbody.innerHTML = `<tr><td colspan="3">No stationary items saved.</td></tr>`;
  } else {
  tbody.innerHTML = rows.map(r=>`
    <tr>
      <td>${r.name}</td>
      <td>${r.price}</td>
      <td class="actions">
        <button class="btn secondary" onclick="editItem(${r.id},'${String(r.name).replace(/'/g,"&#39;")}',${r.price})">Edit</button>
        <button class="btn" onclick="deleteItem(${r.id})">Delete</button>
      </td>
    </tr>
  `).join("");
  }

  const from = allItems.length ? start + 1 : 0;
  const to = Math.min(start + rows.length, allItems.length);
  itemsPageInfo.textContent = `Showing ${from}-${to} of ${allItems.length} items | Page ${itemsPage} of ${totalPages}`;
  prevItemsBtn.disabled = itemsPage <= 1;
  nextItemsBtn.disabled = itemsPage >= totalPages;
}

function changeItemsPage(delta){
  const totalPages = Math.max(1, Math.ceil(allItems.length / ITEMS_PAGE_SIZE));
  itemsPage = Math.min(totalPages, Math.max(1, itemsPage + delta));
  renderItems();
}

function editItem(id, name, price){
  editId = id;
  itemName.value = name;
  itemPrice.value = price;
}

async function deleteItem(id){
  if (!confirm("Delete item?")) return;
  const res = await fetch(`${FEE_API}/stationary/items/${id}`, {method:"DELETE", headers:{"X-Session": currentSession}});
  const data = await res.json();
  if (!res.ok || !data.success) return alert(data.message || "Delete failed");
  loadItems();
}

loadSessions();
loadItems();
</script>
</body>
</html>
