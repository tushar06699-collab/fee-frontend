<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Accountant - Classes</title>
<style>
body{font-family:Poppins,sans-serif;background:#f2f4f7;margin:0;padding:0}
.topbar{width:100%;padding:15px 20px;background:#007bff;color:#fff;display:flex;align-items:center;gap:12px;box-sizing:border-box;position:sticky;top:0;z-index:4000}
.menu-btn{font-size:28px;cursor:pointer;color:#fff;font-weight:900}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);display:none;z-index:1500}
.overlay.show{display:block}
.side-menu{position:fixed;top:0;left:-280px;width:260px;height:100%;background:#fff;box-shadow:2px 0 8px rgba(0,0,0,.18);padding:20px;overflow-y:auto;z-index:2000;transition:left .35s;border-radius:0 18px 18px 0}
.side-menu.open{left:0}
.menu-item{padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;font-size:16px;font-weight:600;color:#333}
.container{max-width:1300px;margin:16px auto;background:#fff;padding:18px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
.toolbar label{font-size:12px;color:#555;display:block;margin-bottom:4px}
.toolbar select{padding:8px;border-radius:8px;border:1px solid #ccc;min-width:220px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px;margin-top:14px}
.card{border:1px solid #e3e6ef;border-radius:10px;padding:14px;background:#f8faff}
.name{font-weight:700;color:#1f2937}
.btn{margin-top:10px;padding:7px 10px;border:0;border-radius:6px;cursor:pointer;background:#0d6efd;color:#fff}
.muted{color:#666;font-size:12px}
@media (max-width:980px){.grid{grid-template-columns:repeat(2,minmax(170px,1fr));}}
@media (max-width:560px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div style="font-size:20px;font-weight:600;">Accountant - Select Class</div>
  <div style="margin-left:auto"><select id="sessionSelect" onchange="changeSession()"></select></div>
</div>
<div id="overlay" class="overlay" onclick="closeMenu()"></div>
<div id="sideMenu" class="side-menu"></div>

<div class="container">
  <div class="muted">Students are not loaded here. Open one class to view paginated students and collect fees.</div>
  <div id="classGrid" class="grid"></div>
</div>

<script>
const FEE_API = localStorage.getItem("apiBaseUrl") || "http://127.0.0.1:5000";
const SESSION_API = localStorage.getItem("sessionApiBaseUrl") || "https://exam-backend-117372286918.asia-south1.run.app/";
const params = new URLSearchParams(window.location.search);
let currentSession = params.get("session") || localStorage.getItem("session") || "2024_25";

function toggleMenu(){ sideMenu.classList.toggle("open"); overlay.classList.toggle("show"); }
function closeMenu(){ sideMenu.classList.remove("open"); overlay.classList.remove("show"); }
function changeSession(){ currentSession = document.getElementById("sessionSelect").value; localStorage.setItem("session", currentSession); loadClasses(); }
function esc(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

async function loadSessions(){
  let list = [];
  try{
    const res = await fetch(`${SESSION_API}/session/list`);
    const data = await res.json();
    list = Array.isArray(data?.sessions) ? data.sessions.map(x => x.name || x).filter(Boolean) : [];
  }catch(_){}
  if (!list.length) list = [currentSession];
  if (!list.includes(currentSession)) list.push(currentSession);
  list = [...new Set(list)];
  const sel = document.getElementById("sessionSelect");
  sel.innerHTML = list.map(x => `<option value="${x}">${x}</option>`).join("");
  sel.value = currentSession;
}

async function loadClasses(){
  const host = document.getElementById("classGrid");
  host.innerHTML = `<div class="muted">Loading classes...</div>`;
  try{
    const res = await fetch(`${FEE_API}/fees/get?session=${encodeURIComponent(currentSession)}`, {
      headers:{ "X-Session": currentSession }
    });
    const data = await res.json().catch(() => ({}));
    const classes = [...new Set((Array.isArray(data?.fees) ? data.fees : []).map(r => String(r.class_name || "").trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:"base"}));
    if (!classes.length){ host.innerHTML = `<div class="muted">No classes found in this session.</div>`; return; }
    host.innerHTML = classes.map(c => `
      <div class="card">
        <div class="name">${esc(c)}</div>
        <button class="btn" onclick="openClass('${encodeURIComponent(c)}')">Open Class</button>
      </div>
    `).join("");
  }catch(e){
    host.innerHTML = `<div class="muted">Failed to load classes: ${esc(e.message)}</div>`;
  }
}

function openClass(clsEnc){
  const cls = decodeURIComponent(clsEnc);
  window.location.href = `accountant_class.html?class=${encodeURIComponent(cls)}&session=${encodeURIComponent(currentSession)}`;
}

(async function init(){
  await loadSessions();
  await loadClasses();
})();
</script>
<script src="shared_menu.js"></script>
</body>
</html>
