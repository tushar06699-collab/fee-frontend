<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Student Transactions</title>
<style>
  body{font-family:Poppins, sans-serif;background:#f2f4f7;margin:0;padding:0}
  .topbar{width:100%;padding:15px 20px;background:#007bff;color:#fff;display:flex;align-items:center;gap:15px;box-sizing:border-box;position:sticky;top:0;z-index:4000}
  .menu-btn{font-size:28px;cursor:pointer;color:#fff;font-weight:900;}
  #sessionSelect{padding:4px 8px;border-radius:6px;border:none;font-size:14px;}
  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);display:none;z-index:1500;}
  .overlay.show{display:block;}
  .side-menu{position:fixed;top:0;left:-280px;width:260px;height:100%;background:#fff;box-shadow:2px 0 8px rgba(0,0,0,0.18);padding:20px;overflow-y:auto;z-index:2000;transition:left 0.35s;border-radius:0 18px 18px 0;}
  .side-menu.open{left:0;}
  .menu-item{padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;font-size:16px;font-weight:600;color:#333;}

  .container{max-width:1200px;margin:15px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .row > div{flex:1;min-width:220px;}
  select{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th,td{border:1px solid #e6e6e6;padding:8px;text-align:left;font-size:14px}
  th{background:#007bff;color:#fff}
  .muted{color:#6b7280;font-size:13px;}
  .badge{padding:3px 8px;border-radius:999px;font-size:12px;font-weight:700;}
  .yes{background:#dcfce7;color:#166534;}
  .no{background:#fee2e2;color:#991b1b;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">&#9776;</div>
    <div style="font-size:20px;font-weight:600;">Student Transactions</div>
    <div style="margin-left:auto; display:flex; align-items:center;">
      <select id="sessionSelect" onchange="changeSession()"></select>
    </div>
  </div>

  <div id="overlay" class="overlay" onclick="closeMenu()"></div>
  <div class="side-menu" id="sideMenu">
    <div class="menu-item" onclick="goToPage('fee_students.html')">Home</div>
    <div class="menu-item" onclick="goToPage('fee_students.html')">Home</div>
    <div class="menu-item" onclick="goToPage('outstanding.html')">Student Fee Module</div>
    <div class="menu-item" onclick="goToPage('stationary_students.html')">Stationary Module</div>
    <div class="menu-item" onclick="goToPage('transactions.html')">Students Transactions </div>
  </div>

  <div class="container">
    <div class="row">
      <div>
        <label class="muted">Class</label>
        <select id="classSelect" onchange="loadStudents()"></select>
      </div>
      <div>
        <label class="muted">Student</label>
        <select id="studentSelect" onchange="loadTransactions()"></select>
      </div>
    </div>

    <div class="muted" id="studentInfo"></div>

    <h3>Fee Receipts</h3>
    <table>
      <thead>
        <tr>
          <th>Receipt No</th>
          <th>Date</th>
          <th>Total Paid</th>
          <th>Total Due</th>
        </tr>
      </thead>
      <tbody id="feeBody"></tbody>
    </table>
    <div class="pager">
      <button id="feePrev" onclick="changeFeePage(-1)">Prev</button>
      <div class="muted" id="feePageInfo">Page 1</div>
      <button id="feeNext" onclick="changeFeePage(1)">Next</button>
    </div>

    <h3 style="margin-top:18px;">Stationary Transactions</h3>
    <table>
      <thead>
        <tr>
          <th>Receipt No</th>
          <th>Date</th>
          <th>Items</th>
          <th>Total (&#8377;)</th>
          <th>Added To Fee Ledger</th>
        </tr>
      </thead>
      <tbody id="stationaryBody"></tbody>
    </table>
    <div class="pager">
      <button id="stPrev" onclick="changeStationaryPage(-1)">Prev</button>
      <div class="muted" id="stPageInfo">Page 1</div>
      <button id="stNext" onclick="changeStationaryPage(1)">Next</button>
    </div>
  </div>

<script>
const FEE_API = localStorage.getItem("apiBaseUrl") || "http://127.0.0.1:5000";
const SESSION_API = localStorage.getItem("sessionApiBaseUrl") || "https://exam-backend-117372286918.asia-south1.run.app/";
const STUDENT_API = localStorage.getItem("studentApiBaseUrl") || "https://student-backend-117372286918.asia-south1.run.app/";
let currentSession = localStorage.getItem("session") || "2024_25";
let masterStudents = [];
let feePage = 1;
let stationaryPage = 1;
const PAGE_SIZE = 10;

function toggleMenu(){ sideMenu.classList.toggle("open"); overlay.classList.toggle("show"); }
function closeMenu(){ sideMenu.classList.remove("open"); overlay.classList.remove("show"); }
function goToPage(p){ window.location.href = p + "?session=" + encodeURIComponent(currentSession); }

async function loadSessions(){
  try{
    const res = await fetch(SESSION_API + "/session/list");
    const data = await res.json();
    const sel = document.getElementById("sessionSelect");
    sel.innerHTML = "";
    const sessions = (data.sessions && data.sessions.length) ? data.sessions : [currentSession];
    sessions.forEach(s=>{
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      if (s === currentSession) opt.selected = true;
      sel.appendChild(opt);
    });
  }catch(e){
    const sel = document.getElementById("sessionSelect");
    sel.innerHTML = `<option>${currentSession}</option>`;
  }
}

function changeSession(){
  currentSession = sessionSelect.value;
  localStorage.setItem("session", currentSession);
  loadClasses();
}

async function loadClasses(){
  const res = await fetch(`${STUDENT_API}/students?session=${encodeURIComponent(currentSession)}`);
  const data = await res.json();
  masterStudents = Array.isArray(data) ? data : (data.students || []);
  const classes = [...new Set(masterStudents.map(s => (s.class_name || s.class || "").trim()).filter(Boolean))];
  classes.sort((a,b)=>a.localeCompare(b, undefined, {numeric:true}));
  classSelect.innerHTML = classes.map(c=>`<option value="${c}">${c}</option>`).join("");
  loadStudents();
}

function loadStudents(){
  const cls = classSelect.value || "";
  const rows = masterStudents.filter(s => (s.class_name || s.class) === cls);
  rows.sort((a,b)=>{
    const ra = String(a.rollno ?? a.roll ?? "");
    const rb = String(b.rollno ?? b.roll ?? "");
    const na = parseInt(ra, 10);
    const nb = parseInt(rb, 10);
    const va = Number.isFinite(na) ? na : Number.MAX_SAFE_INTEGER;
    const vb = Number.isFinite(nb) ? nb : Number.MAX_SAFE_INTEGER;
    if (va !== vb) return va - vb;
    return ra.localeCompare(rb, undefined, {numeric:true});
  });
  studentSelect.innerHTML = rows.map(r=>{
    const roll = String(r.rollno ?? r.roll ?? "");
    const name = r.student_name || r.name || "";
    return `<option value="${roll}">${name} (Roll ${roll})</option>`;
  }).join("");
  loadTransactions();
}

async function loadTransactions(){
  const cls = classSelect.value || "";
  const roll = studentSelect.value || "";
  const student = masterStudents.find(s => (s.class_name || s.class) === cls && String(s.rollno ?? s.roll ?? "") === roll) || {};
  studentInfo.textContent = `Student: ${student.student_name || student.name || "-"} | Class: ${cls} | Roll: ${roll}`;

  const feeRes = await fetch(`${FEE_API}/receipt/history?class=${encodeURIComponent(cls)}&roll=${encodeURIComponent(roll)}&page=${feePage}&page_size=${PAGE_SIZE}`, {
    headers: {"X-Session": currentSession}
  });
  const feeData = await feeRes.json();
  const feeRows = feeData.history || [];
  feeBody.innerHTML = feeRows.map(r=>`
    <tr>
      <td>${r.receipt_number || "-"}</td>
      <td>${r.date || "-"}</td>
      <td>${r.total_paid || 0}</td>
      <td>${r.total_due || 0}</td>
    </tr>
  `).join("");

  const stRes = await fetch(`${FEE_API}/stationary/receipts?class=${encodeURIComponent(cls)}&roll=${encodeURIComponent(roll)}&page=${stationaryPage}&page_size=${PAGE_SIZE}`, {
    headers: {"X-Session": currentSession}
  });
  const stData = await stRes.json();
  const stRows = stData.receipts || [];
  stationaryBody.innerHTML = stRows.map(r=>{
    const items = (r.items || []).map(it=>`${it.name} x${it.qty}`).join(", ");
    const badge = r.added_to_fee ? `<span class="badge yes">Yes</span>` : `<span class="badge no">No</span>`;
    return `<tr>
      <td>${r.receipt_no}</td>
      <td>${r.date || "-"}</td>
      <td>${items || "-"}</td>
      <td>${r.total || 0}</td>
      <td>${badge}</td>
    </tr>`;
  }).join("");

  renderPagers(feeData, stData);
}

function renderPagers(feeData, stData){
  const feeInfo = document.getElementById("feePageInfo");
  const feePrev = document.getElementById("feePrev");
  const feeNext = document.getElementById("feeNext");
  const stInfo = document.getElementById("stPageInfo");
  const stPrev = document.getElementById("stPrev");
  const stNext = document.getElementById("stNext");

  if (feeInfo){
    feeInfo.textContent = `Page ${feeData.page || feePage} of ${feeData.total_pages || 1}`;
    feePrev.disabled = (feeData.page || feePage) <= 1;
    feeNext.disabled = (feeData.page || feePage) >= (feeData.total_pages || 1);
  }
  if (stInfo){
    stInfo.textContent = `Page ${stData.page || stationaryPage} of ${stData.total_pages || 1}`;
    stPrev.disabled = (stData.page || stationaryPage) <= 1;
    stNext.disabled = (stData.page || stationaryPage) >= (stData.total_pages || 1);
  }
}

function changeFeePage(delta){
  feePage = Math.max(1, feePage + delta);
  loadTransactions();
}
function changeStationaryPage(delta){
  stationaryPage = Math.max(1, stationaryPage + delta);
  loadTransactions();
}

loadSessions().then(loadClasses);
</script>
</body>
</html>
