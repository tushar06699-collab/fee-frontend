<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholarship & Concession</title>
<style>
:root{
  --brand:#0f4aa3;
  --brand-2:#1f6feb;
  --bg:#eef3fb;
  --card:#fff;
  --line:#d8e2f0;
  --text:#1f2937;
  --muted:#6b7280;
  --ok:#0f9d58;
  --danger:#b42318;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 420px at -10% -20%, #dce9ff 0%, transparent 50%),
    radial-gradient(900px 320px at 100% 0%, #d7f0ff 0%, transparent 45%),
    var(--bg);
}
.topbar{
  background:linear-gradient(90deg,var(--brand),var(--brand-2));
  color:#fff;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:10;
}
.menu-btn{font-size:28px;cursor:pointer;color:#fff;font-weight:900;line-height:1}
.title{font-size:20px;font-weight:700}
.spacer{flex:1}
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.35);display:none;z-index:1500;
}
.overlay.show{display:block}
.side-menu{
  position:fixed;top:0;left:-280px;width:260px;height:100%;
  background:#fff;box-shadow:2px 0 8px rgba(0,0,0,.18);
  padding:20px;overflow-y:auto;z-index:2000;transition:left .35s;
  border-radius:0 18px 18px 0;
}
.side-menu.open{left:0}
.menu-item{
  padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;
  font-size:16px;font-weight:600;color:#333;
}
.wrap{max-width:1450px;margin:18px auto;padding:0 14px}
.panel{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  box-shadow:0 10px 28px rgba(15,74,163,.10);
  padding:16px;
}
.toolbar{
  display:grid;
  grid-template-columns:220px 220px 1fr;
  gap:10px;
  align-items:end;
}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
select,input,textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px 11px;
  font-size:14px;
  background:#fff;
}
.cards{
  margin-top:12px;
  display:grid;
  grid-template-columns:repeat(3,minmax(160px,1fr));
  gap:10px;
}
.card{border:1px solid var(--line);border-radius:12px;background:#f8fbff;padding:12px}
.k{color:var(--muted);font-size:12px}
.v{font-size:22px;font-weight:800;margin-top:4px}
.table-wrap{margin-top:14px;overflow:auto}
table{width:100%;border-collapse:collapse;min-width:1120px}
th,td{border-bottom:1px solid var(--line);padding:10px 8px;font-size:14px;text-align:left}
th{background:#f2f7ff;color:#0f3c84;font-weight:700}
.student-link{color:#0f4aa3;font-weight:700;cursor:pointer;text-decoration:underline}
.pill{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.pill.off{background:#f3f4f6;color:#374151}
.pill.on{background:#dcfce7;color:#166534}
.btn{
  border:none;border-radius:8px;padding:8px 11px;cursor:pointer;
  background:#0f4aa3;color:#fff;font-size:13px;
}
.btn.ok{background:var(--ok)}
.btn.gray{background:#6b7280}
.editor{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:6200;
  width:min(980px,calc(100vw - 24px));
  max-height:86vh;
  overflow:auto;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fafdff;
  padding:12px;
  box-shadow:0 14px 30px rgba(0,0,0,.22);
}
.editor-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:6100;
  display:none;
}
.editor-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(140px,1fr));
  gap:10px;
}
.section-title{font-size:13px;font-weight:700;color:#0f3c84;margin-bottom:8px}
.help{font-size:12px;color:var(--muted)}
.status{margin-top:8px;font-size:13px;font-weight:700}
.status.ok{color:var(--ok)}
.status.err{color:var(--danger)}
@media (max-width:1050px){
  .toolbar{grid-template-columns:1fr}
  .cards{grid-template-columns:1fr 1fr}
  .editor-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
  <div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="title">Scholarship & Concession</div>
    <div class="spacer"></div>
  </div>
  <div id="overlay" class="overlay"></div>
  <div id="sideMenu" class="side-menu"></div>
  <div id="editorBackdrop" class="editor-backdrop" onclick="closeEditor()"></div>

  <div class="wrap">
    <div class="panel">
      <div class="toolbar">
        <div>
          <label>Session</label>
          <select id="sessionSelect"></select>
        </div>
        <div>
          <label>Class</label>
          <select id="classFilter"><option value="">All Classes</option></select>
        </div>
        <div>
          <label>Search student</label>
          <input id="searchInput" placeholder="Type name / roll / admission no">
        </div>
      </div>

      <div class="cards">
        <div class="card"><div class="k">Students Shown</div><div class="v" id="countShown">0</div></div>
        <div class="card"><div class="k">Scholarship Enabled</div><div class="v" id="countScholarship">0</div></div>
        <div class="card"><div class="k">Concession Enabled</div><div class="v" id="countConcession">0</div></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Class</th>
              <th>Roll</th>
              <th>Admission No</th>
              <th>Scholarship</th>
              <th>Concession</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="studentBody"></tbody>
        </table>
      </div>

      <div id="editor" class="editor" style="display:none">
        <div class="section-title">Update Student Scholarship / Concession</div>
        <div id="editorTitle" style="font-weight:700;margin-bottom:10px"></div>

        <div class="section-title">Scholarship</div>
        <div class="editor-grid">
          <div>
            <label>Enabled</label>
            <select id="schEnabled">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div>
            <label>Type</label>
            <select id="schType">
              <option value="fixed">Fixed</option>
              <option value="percentage">Percentage</option>
            </select>
          </div>
          <div>
            <label>Value</label>
            <input id="schValue" type="number" min="0" value="0">
          </div>
          <div>
            <label>Scope</label>
            <select id="schScope">
              <option value="monthly">Monthly</option>
              <option value="annual">Annual</option>
              <option value="admission">Admission</option>
              <option value="all">All</option>
            </select>
          </div>
        </div>
        <div style="margin-top:8px">
          <label>Scholarship Note</label>
          <textarea id="schNote" rows="2" placeholder="Reason / approved by"></textarea>
        </div>

        <div class="section-title" style="margin-top:12px">Concession</div>
        <div class="editor-grid">
          <div>
            <label>Enabled</label>
            <select id="conEnabled">
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div>
            <label>Type</label>
            <select id="conType">
              <option value="fixed">Fixed</option>
              <option value="percentage">Percentage</option>
            </select>
          </div>
          <div>
            <label>Value</label>
            <input id="conValue" type="number" min="0" value="0">
          </div>
          <div>
            <label>Scope</label>
            <select id="conScope">
              <option value="monthly">Monthly</option>
              <option value="annual">Annual</option>
              <option value="admission">Admission</option>
              <option value="all">All</option>
            </select>
          </div>
        </div>
        <div style="margin-top:8px">
          <label>Concession Note</label>
          <textarea id="conNote" rows="2" placeholder="Reason / approved by"></textarea>
        </div>

        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button class="btn ok" onclick="saveDiscounts()">Save</button>
          <button class="btn gray" onclick="closeEditor()">Cancel</button>
          <button class="btn" onclick="openStudentDetails()">Open Student Details</button>
        </div>
        <div class="help" style="margin-top:6px">Tip: click student name in list to edit quickly.</div>
        <div id="saveStatus" class="status"></div>
      </div>
    </div>
  </div>

<script>
const FEE_API = localStorage.getItem("apiBaseUrl") || "http://127.0.0.1:5000";
const SESSION_API = localStorage.getItem("sessionApiBaseUrl") || "https://exam-backend-117372286918.asia-south1.run.app/";
const STUDENT_API = localStorage.getItem("studentApiBaseUrl") || "https://student-backend-117372286918.asia-south1.run.app/";

const params = new URLSearchParams(window.location.search);
let currentSession = params.get("session") || localStorage.getItem("session") || "2024_25";
let allRows = [];
let selected = null;

function toNum(x){ const n = Number(x); return Number.isFinite(n) ? n : 0; }
function escapeHtml(s){
  return String(s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[c]));
}
function normalizeDiscount(d){
  const cfg = (d && typeof d === "object") ? d : {};
  const type = ["fixed", "percentage"].includes(String(cfg.type || "").toLowerCase()) ? String(cfg.type).toLowerCase() : "fixed";
  const scope = ["monthly", "annual", "admission", "all"].includes(String(cfg.scope || "").toLowerCase()) ? String(cfg.scope).toLowerCase() : "monthly";
  return {
    enabled: Boolean(cfg.enabled),
    type,
    value: Math.max(0, toNum(cfg.value)),
    scope,
    note: String(cfg.note || "").trim()
  };
}
function discountLabel(d){
  const cfg = normalizeDiscount(d);
  if (!cfg.enabled || cfg.value <= 0) return `<span class="pill off">Not Set</span>`;
  const unit = cfg.type === "percentage" ? "%" : "Rs";
  return `<span class="pill on">${cfg.value}${unit} (${cfg.scope})</span>`;
}

async function loadSessions(){
  const sel = document.getElementById("sessionSelect");
  sel.innerHTML = "";
  let list = [];
  try{
    const res = await fetch(`${SESSION_API}/session/list`);
    const data = await res.json();
    list = Array.isArray(data.sessions) ? data.sessions.map(x => x.name) : [];
  }catch(_){}
  if (!list.length) list = [currentSession];
  if (!list.includes(currentSession)) list.push(currentSession);
  list = [...new Set(list)];
  list.forEach(s => {
    const op = document.createElement("option");
    op.value = s;
    op.textContent = s;
    sel.appendChild(op);
  });
  sel.value = currentSession;
  sel.addEventListener("change", () => {
    currentSession = sel.value;
    localStorage.setItem("session", currentSession);
    history.replaceState({}, "", `scholarship.html?session=${encodeURIComponent(currentSession)}`);
    loadRows();
  });
}

function normalizeMasterStudent(s){
  return {
    name: String(s.student_name || s.name || "").trim(),
    father: String(s.father_name || s.father || "").trim(),
    class_name: String(s.class_name || s.class || "").trim(),
    roll: String(s.rollno ?? s.roll ?? "").trim(),
    admission_no: String(s.admission_no ?? s.admissionNo ?? "").trim(),
    phone: String(s.mobile || s.phone || s.parent_mobile || "").trim(),
    source: "master"
  };
}

function normalizeFeeStudent(s){
  return {
    name: String(s.name || "").trim(),
    father: String(s.father || "").trim(),
    class_name: String(s.class_name || s.class || "").trim(),
    roll: String(s.roll ?? "").trim(),
    admission_no: String(s.admission_no ?? s.admissionNo ?? "").trim(),
    phone: "",
    previous_due: toNum(s.previous_due),
    advance: toNum(s.advance),
    months: (s.months && typeof s.months === "object") ? s.months : {},
    payment_methods: (s.payment_methods && typeof s.payment_methods === "object") ? s.payment_methods : { cash: 0, upi: 0, bank: 0 },
    last_payment_method: String(s.last_payment_method || ""),
    scholarship: normalizeDiscount(s.scholarship),
    concession: normalizeDiscount(s.concession),
    source: "fee"
  };
}

async function loadRows(){
  const body = document.getElementById("studentBody");
  body.innerHTML = `<tr><td colspan="8">Loading...</td></tr>`;
  selected = null;
  closeEditor();

  try{
    const [masterRes, feeRes] = await Promise.allSettled([
      fetch(`${STUDENT_API}/students?session=${encodeURIComponent(currentSession)}`),
      fetch(`${FEE_API}/students?session=${encodeURIComponent(currentSession)}`, { headers: { "X-Session": currentSession } })
    ]);

    const masterRows = [];
    const feeRows = [];

    if (masterRes.status === "fulfilled" && masterRes.value.ok) {
      const m = await masterRes.value.json();
      const arr = Array.isArray(m) ? m : (Array.isArray(m?.students) ? m.students : []);
      arr.forEach(x => masterRows.push(normalizeMasterStudent(x)));
    }
    if (feeRes.status === "fulfilled" && feeRes.value.ok) {
      const f = await feeRes.value.json();
      const arr = Array.isArray(f) ? f : (Array.isArray(f?.students) ? f.students : []);
      arr.forEach(x => feeRows.push(normalizeFeeStudent(x)));
    }

    const map = new Map();
    masterRows.forEach(m => {
      const key = `${m.class_name}|${m.roll}`;
      map.set(key, {
        ...m,
        previous_due: 0,
        advance: 0,
        months: {},
        payment_methods: { cash: 0, upi: 0, bank: 0 },
        last_payment_method: "",
        scholarship: normalizeDiscount({}),
        concession: normalizeDiscount({})
      });
    });
    feeRows.forEach(f => {
      const key = `${f.class_name}|${f.roll}`;
      const base = map.get(key) || {};
      map.set(key, {
        ...base,
        ...f,
        name: f.name || base.name || "",
        father: f.father || base.father || "",
        admission_no: f.admission_no || base.admission_no || "",
        phone: base.phone || ""
      });
    });

    allRows = [...map.values()]
      .filter(r => r.class_name && r.roll)
      .sort((a, b) => {
        const c = a.class_name.localeCompare(b.class_name, undefined, { numeric: true, sensitivity: "base" });
        if (c !== 0) return c;
        return String(a.roll).localeCompare(String(b.roll), undefined, { numeric: true, sensitivity: "base" });
      });

    renderClassFilter();
    renderRows();
  }catch(e){
    body.innerHTML = `<tr><td colspan="8">Failed to load students: ${escapeHtml(e.message)}</td></tr>`;
  }
}

function renderClassFilter(){
  const sel = document.getElementById("classFilter");
  const current = sel.value || "";
  const classes = [...new Set(allRows.map(r => r.class_name).filter(Boolean))];
  sel.innerHTML = `<option value="">All Classes</option>`;
  classes.forEach(c => {
    const op = document.createElement("option");
    op.value = c;
    op.textContent = c;
    sel.appendChild(op);
  });
  if (classes.includes(current)) sel.value = current;
}

function getFilteredRows(){
  const cls = document.getElementById("classFilter").value.trim().toLowerCase();
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  return allRows.filter(r => {
    if (cls && String(r.class_name).toLowerCase() !== cls) return false;
    if (!q) return true;
    const blob = `${r.name} ${r.roll} ${r.admission_no}`.toLowerCase();
    return blob.includes(q);
  });
}

function renderRows(){
  const rows = getFilteredRows();
  const body = document.getElementById("studentBody");
  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="8">No students found.</td></tr>`;
  } else {
    body.innerHTML = rows.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><span class="student-link" onclick="openEditor('${encodeURIComponent(r.class_name)}','${encodeURIComponent(r.roll)}')">${escapeHtml(r.name || "-")}</span></td>
        <td>${escapeHtml(r.class_name)}</td>
        <td>${escapeHtml(r.roll)}</td>
        <td>${escapeHtml(r.admission_no || "-")}</td>
        <td>${discountLabel(r.scholarship)}</td>
        <td>${discountLabel(r.concession)}</td>
        <td><button class="btn" onclick="openEditor('${encodeURIComponent(r.class_name)}','${encodeURIComponent(r.roll)}')">Edit</button></td>
      </tr>
    `).join("");
  }

  document.getElementById("countShown").textContent = rows.length;
  document.getElementById("countScholarship").textContent = rows.filter(r => normalizeDiscount(r.scholarship).enabled && toNum(r.scholarship?.value) > 0).length;
  document.getElementById("countConcession").textContent = rows.filter(r => normalizeDiscount(r.concession).enabled && toNum(r.concession?.value) > 0).length;
}

function findRowByKey(cls, roll){
  return allRows.find(r => String(r.class_name) === String(cls) && String(r.roll) === String(roll)) || null;
}

function fillEditor(r){
  const sch = normalizeDiscount(r.scholarship);
  const con = normalizeDiscount(r.concession);
  document.getElementById("editorTitle").textContent = `${r.name || "-"} | ${r.class_name} | Roll ${r.roll}`;
  document.getElementById("schEnabled").value = sch.enabled ? "1" : "0";
  document.getElementById("schType").value = sch.type;
  document.getElementById("schValue").value = sch.value;
  document.getElementById("schScope").value = sch.scope;
  document.getElementById("schNote").value = sch.note;
  document.getElementById("conEnabled").value = con.enabled ? "1" : "0";
  document.getElementById("conType").value = con.type;
  document.getElementById("conValue").value = con.value;
  document.getElementById("conScope").value = con.scope;
  document.getElementById("conNote").value = con.note;
  document.getElementById("saveStatus").textContent = "";
  document.getElementById("editor").style.display = "block";
}

function readEditorDiscount(prefix){
  const enabled = document.getElementById(`${prefix}Enabled`).value === "1";
  const type = document.getElementById(`${prefix}Type`).value;
  const value = Math.max(0, toNum(document.getElementById(`${prefix}Value`).value));
  const scope = document.getElementById(`${prefix}Scope`).value;
  const note = String(document.getElementById(`${prefix}Note`).value || "").trim();
  return normalizeDiscount({ enabled, type, value, scope, note });
}

function openEditor(clsEnc, rollEnc){
  const cls = decodeURIComponent(clsEnc || "");
  const roll = decodeURIComponent(rollEnc || "");
  const r = findRowByKey(cls, roll);
  if (!r) return;
  selected = r;
  fillEditor(r);
  document.getElementById("editorBackdrop").style.display = "block";
  document.body.style.overflow = "hidden";
}

function closeEditor(){
  document.getElementById("editor").style.display = "none";
  document.getElementById("editorBackdrop").style.display = "none";
  document.body.style.overflow = "";
  document.getElementById("saveStatus").textContent = "";
}

function openStudentDetails(){
  if (!selected) return;
  window.location.href = `student_details.html?class=${encodeURIComponent(selected.class_name)}&roll=${encodeURIComponent(selected.roll)}&session=${encodeURIComponent(currentSession)}`;
}

async function upsertStudentWithDiscounts(studentPayload){
  const updateBody = {
    class: studentPayload.class_name,
    roll: studentPayload.roll,
    student: studentPayload
  };
  const res = await fetch(`${FEE_API}/update_student?session=${encodeURIComponent(currentSession)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session": currentSession },
    body: JSON.stringify(updateBody)
  });
  const data = await res.json().catch(() => ({}));
  if (res.ok && data?.success) return { ok: true };
  if (res.status !== 404) {
    throw new Error(data?.message || "Failed to update student");
  }

  const createRes = await fetch(`${FEE_API}/student/add?session=${encodeURIComponent(currentSession)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Session": currentSession },
    body: JSON.stringify({
      name: studentPayload.name || "Unknown",
      father: studentPayload.father || "",
      class_name: studentPayload.class_name,
      roll: studentPayload.roll,
      admission_no: studentPayload.admission_no || "",
      previous_due: toNum(studentPayload.previous_due),
      advance: toNum(studentPayload.advance),
      months: studentPayload.months || {},
      payment_methods: studentPayload.payment_methods || { cash: 0, upi: 0, bank: 0 },
      last_payment_method: studentPayload.last_payment_method || "",
      scholarship: studentPayload.scholarship || normalizeDiscount({}),
      concession: studentPayload.concession || normalizeDiscount({})
    })
  });
  const createData = await createRes.json().catch(() => ({}));
  if (!createRes.ok || createData?.success === false) {
    throw new Error(createData?.message || "Failed to create student fee record");
  }
  return { ok: true };
}

async function saveDiscounts(){
  if (!selected) return;
  const status = document.getElementById("saveStatus");
  try{
    status.className = "status";
    status.textContent = "Saving...";

    const updated = {
      ...selected,
      scholarship: readEditorDiscount("sch"),
      concession: readEditorDiscount("con")
    };

    await upsertStudentWithDiscounts(updated);
    const idx = allRows.findIndex(r => r.class_name === selected.class_name && r.roll === selected.roll);
    if (idx >= 0) allRows[idx] = { ...allRows[idx], scholarship: updated.scholarship, concession: updated.concession };
    selected = allRows[idx >= 0 ? idx : 0];

    renderRows();
    fillEditor(updated);
    status.className = "status ok";
    status.textContent = "Saved successfully.";
  }catch(e){
    status.className = "status err";
    status.textContent = `Save failed: ${e.message}`;
  }
}

document.getElementById("classFilter").addEventListener("change", renderRows);
document.getElementById("searchInput").addEventListener("input", renderRows);

(async function init(){
  await loadSessions();
  await loadRows();
})();
</script>
<script src="shared_menu.js"></script>
</body>
</html>
