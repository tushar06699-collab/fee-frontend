<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard – School ERP</title>

<style>
body{
    font-family:Poppins, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

/* TOP BAR */
.topbar{
    width:100%;
    padding:15px 20px;
    background:#007bff;
    color:#fff;
    display:flex;
    justify-content:flex-start;
    align-items:center;
    gap:15px;
    box-sizing:border-box;
    position:sticky;
    top:0;
    z-index:3000;
    font-size:20px;
    font-weight:600;
}

/* LEFT HAMBURGER */
.menu-btn{
    font-size:28px;
    cursor:pointer;
    font-weight:900;
    user-select:none;
    transition:0.3s;
}
.menu-btn:hover{
    opacity:0.8;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.35);
    display:none;
    z-index:1400;
}
.overlay.show{ display:block; }

/* LEFT SLIDING SIDE MENU */
.side-menu{
    position:fixed;
    top:0;
    left:-280px;
    width:260px;
    height:100%;
    background:#fff;
    box-shadow:2px 0 8px rgba(0,0,0,.15);
    padding:20px;
    transition:left 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    z-index:2000;
    border-radius:0 18px 18px 0;
}
.side-menu.open{ left:0; }

.menu-item{
    padding:12px 0;
    border-bottom:1px solid #eee;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}
.menu-item:hover{ color:#007bff; }

/* DASHBOARD GRID */
.dashboard-boxes{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

.box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
    text-align:center;
    font-weight:600;
}
.box-title{
    font-size:14px;
    color:#666;
}
.box-value{
    font-size:30px;
    margin-top:10px;
    color:#89552b;
    font-weight:700;
}

/* QUICK LINKS */
.quick-links{
    padding:20px;
}
.btn-link{
    display:block;
    background:#6fc24f;
    color:#fff;
    padding:12px;
    border-radius:8px;
    text-align:center;
    margin-bottom:12px;
    text-decoration:none;
    font-weight:600;
    cursor: pointer;
}
.btn-link:hover{
    background:#57a63e;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div style="flex:1">
        Dashboard
        <span id="currentSession" style="font-size:14px; margin-left:10px; font-weight:400; color:#ffeeba;"></span>
    </div>

    <!-- Edit Session Button -->
    <button onclick="window.location.href='session.html'"
        style="
            margin-left:auto;
            background:#cf6d62;
            border:none;
            padding:6px 12px;
            color:white;
            border-radius:6px;
            font-size:13px;
            cursor:pointer;
        ">
        ✏️ Edit Session
    </button>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<!-- LEFT SLIDE MENU -->
<div id="sideMenu" class="side-menu">
    <div class="menu-item" onclick="goToPage('edit.html')">Edit Student</div>
    <div class="menu-item" onclick="goToPage('dashboard.html')">Dashboard</div>
    <div class="menu-item" onclick="goToPage('fees.html')">Fees Modify</div>
    <div class="menu-item" onclick="goToPage('receipt_history.html')">Receipt History</div>
    <div class="menu-item" onclick="goToPage('export.html')">Export Data</div>
</div>

<!-- DASHBOARD BOXES -->
<div class="dashboard-boxes">
    <div class="box">
        <div class="box-title">Total Students</div>
        <div id="totalStudents" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Total Classes</div>
        <div id="totalClasses" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Paid</div>
        <div id="paidCount" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Partial</div>
        <div id="partialCount" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Due</div>
        <div id="dueCount" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Total Paid (Receipts)</div>
        <div id="totalCollection" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Today's Paid</div>
        <div id="todayCollection" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Total Receipts</div>
        <div id="totalReceipts" class="box-value">0</div>
    </div>

    <div class="box">
        <div class="box-title">Today's Receipts</div>
        <div id="todayReceipts" class="box-value">0</div>
    </div>
</div>

<!-- QUICK LINKS -->
<div class="quick-links">
    <a class="btn-link" onclick="backupDatabase()">☁️ Backup Database to Drive</a>
    <p id="backupStatus" style="color:#007bff;font-weight:600;margin-top:10px;"></p>
</div>

<script>
const API = "http://127.0.0.1:5000";
const STUDENT_API = localStorage.getItem("studentApiBaseUrl") || "https://student-backend-117372286918.asia-south1.run.app/";
const params = new URLSearchParams(window.location.search);
let session = params.get("session") || localStorage.getItem("session") || "2024_25";
localStorage.setItem("session", session);
document.getElementById("currentSession").innerText = "(Session: " + session + ")";

function money(n){
    return "Rs. " + Number(n || 0).toLocaleString("en-IN");
}

function toNum(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
}

function toDateKeyFromAny(value){
    const raw = String(value || "").trim();
    if (!raw) return "";

    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;

    const m = raw.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
    if (m) {
        let a = parseInt(m[1], 10);
        let b = parseInt(m[2], 10);
        let y = parseInt(m[3], 10);
        if (y < 100) y += 2000;

        let day = a;
        let month = b;
        if (a <= 12 && b > 12) {
            month = a;
            day = b;
        }

        if (month >= 1 && month <= 12 && day >= 1 && day <= 31) {
            return `${y}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        }
    }

    const dt = new Date(raw);
    if (isNaN(dt.getTime())) return "";
    return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
}

function normalizeClassName(value){
    const text = String(value || "").trim().replace(/\s+/g, " ");
    if (!text) return "";
    return text.replace(/\s+[AB]$/i, "").trim();
}

function parseRows(data){
    return Array.isArray(data) ? data : (Array.isArray(data?.students) ? data.students : []);
}

async function loadDashboard(){
    const now = new Date();
    const todayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

    const [masterRes, feeStudentsRes, receiptsRes] = await Promise.allSettled([
        fetch(`${STUDENT_API}/students?session=${encodeURIComponent(session)}`),
        fetch(`${API}/students?session=${encodeURIComponent(session)}`, {
            headers:{ "X-Session": session }
        }),
        fetch(`${API}/receipt/history?session=${encodeURIComponent(session)}`, {
            headers:{ "X-Session": session }
        })
    ]);

    let students = [];
    if (masterRes.status === "fulfilled" && masterRes.value.ok) {
        const mData = await masterRes.value.json().catch(() => ({}));
        const mRows = parseRows(mData);
        students = mRows.map(s => ({
            class_name: normalizeClassName(s.class_name || s.class || ""),
            months: s.months || {}
        })).filter(s => s.class_name);
    }

    // Fallback to fee backend students when master backend is unavailable/empty.
    if (!students.length && feeStudentsRes.status === "fulfilled") {
        const sData = await feeStudentsRes.value.json().catch(() => ({}));
        const sRows = parseRows(sData);
        students = sRows.map(s => ({
            class_name: normalizeClassName(s.class_name || s.class || ""),
            months: s.months || {}
        })).filter(s => s.class_name);
    }

    let receipts = [];
    if (receiptsRes.status === "fulfilled") {
        const rData = await receiptsRes.value.json().catch(() => ({}));
        if (receiptsRes.value.ok && rData?.success) {
            receipts = Array.isArray(rData.history) ? rData.history : [];
        }
    }

    document.getElementById("totalStudents").innerText = students.length;

    const classes = new Set(students.map(s => normalizeClassName(s.class_name)).filter(Boolean));
    document.getElementById("totalClasses").innerText = classes.size;

    let paid = 0, partial = 0, due = 0;
    students.forEach(s => {
        const months = s.months || {};
        Object.keys(months).forEach(m => {
            const rec = months[m] || {};
            const status = rec.status || "Due";
            if(status === "Paid") paid++;
            else if(status === "Partial") partial++;
            else due++;
        });
    });

    const totalReceipts = receipts.length;
    const totalCollection = receipts.reduce((sum, r) => sum + toNum(r.total_paid ?? r.totalPaid), 0);

    let todayReceipts = 0;
    let todayCollection = 0;
    receipts.forEach(r => {
        const d = toDateKeyFromAny(r.date);
        if (d === todayKey) {
            todayReceipts += 1;
            todayCollection += toNum(r.total_paid ?? r.totalPaid);
        }
    });

    document.getElementById("paidCount").innerText = paid;
    document.getElementById("partialCount").innerText = partial;
    document.getElementById("dueCount").innerText = due;

    document.getElementById("totalCollection").innerText = money(totalCollection);
    document.getElementById("todayCollection").innerText = money(todayCollection);
    document.getElementById("totalReceipts").innerText = String(totalReceipts);
    document.getElementById("todayReceipts").innerText = String(todayReceipts);
}

loadDashboard();

async function backupDatabase() {
    document.getElementById("backupStatus").innerText =
        "Uploading ALL session backups to Google Drive...";

    try {
        const res = await fetch(`${API}/backup/save_all_to_drive`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            }
        });

        const result = await res.json();

        if (result.success) {
            document.getElementById("backupStatus").innerText =
                "All session backups uploaded successfully!";
        } else {
            document.getElementById("backupStatus").innerText =
                "Error: " + result.message;
        }
    } catch (err) {
        document.getElementById("backupStatus").innerText =
            "Failed: " + err.message;
    }
}
</script>
<script src="shared_menu.js"></script>
</body>
</html>
