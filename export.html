<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Export Data – School ERP</title>
<style>
body{
    font-family:Poppins, sans-serif;
    background:#eef1f5;
    margin:0;
    padding:0 20px 40px;
}

/* TOP BAR */
.topbar{
    width:100%;
    padding:15px 20px;
    background:#007bff;
    color:#fff;
    display:flex;
    align-items:center;
    gap:15px;
    box-sizing:border-box;
    position:sticky;
    top:0;
    z-index:3000;
    margin:0 -20px 30px;
    font-size:20px;
    font-weight:600;
}
.menu-btn{font-size:28px;cursor:pointer;color:#fff;font-weight:900;}

.overlay {
    position: fixed;top:0;left:0;width:100%;height:100%;
    background: rgba(0,0,0,0.35);display:none;z-index:1500;
}
.overlay.show { display:block; }

.side-menu{
    position:fixed;top:0;left:-280px;width:260px;height:100%;
    background:#fff;box-shadow:2px 0 8px rgba(0,0,0,0.18);
    padding:20px;overflow-y:auto;z-index:2000;
    transition: left 0.35s;
    border-radius:0 18px 18px 0;
}
.side-menu.open{ left:0; }

.menu-item{
    padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;
    font-size:16px;font-weight:600;color:#333;
}

.session-badge{
    margin-left:auto;
    font-weight:600;
    background:#ffc107;
    color:#000;
    padding:4px 10px;
    border-radius:6px;
}

/* CARD */
.card{
    background:#fff;
    padding:35px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    max-width:480px;
    margin:auto;
    text-align:center;
    animation:fadeIn .5s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(15px);}
    to{opacity:1;transform:translateY(0);}
}

h2{
    margin-top:0;
    color:#333;
    font-size:26px;
}

p{
    color:#666;
    font-size:15px;
    margin-bottom:25px;
}

.btn{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    width:100%;
    margin-bottom:15px;
    transition:0.3s;
}

.excel{ background:#007bff; color:#fff; }
.excel:hover{ background:#005ecb; }

.google{ background:#34A853; color:#fff; }
.google:hover{ background:#1f7f3e; }

</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div>P.S. Public School</div>
    <span class="session-badge">Session: <span id="currentSession"></span></span>
</div>
<div id="overlay" class="overlay" onclick="closeMenu()"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-item" onclick="goToPage('edit.html')">Edit Student</div>
    <div class="menu-item" onclick="goToPage('dashboard.html')">Dashboard</div>
    <div class="menu-item" onclick="goToPage('fees.html')">Fees Modify</div>
    <div class="menu-item" onclick="goToPage('receipt_history.html')">Receipt History</div>
    <div class="menu-item" onclick="goToPage('export.html')">Export Data</div>
</div>

<!-- CARD -->
<div class="card">
    <h2>📤 Export School Data</h2>
    <p>Export all student records, fee details, and receipts for the selected session.</p>

    <button class="btn excel" onclick="exportExcel()">⬇ Export to Excel</button>
</div>

<script>
const API = "http://127.0.0.1:5000";
const params = new URLSearchParams(window.location.search);
let session = params.get("session") || localStorage.getItem("session") || "2024_25";
localStorage.setItem("session", session);

// Show current session
document.getElementById("currentSession").innerText = session;

function toggleMenu(){ sideMenu.classList.toggle("open"); overlay.classList.toggle("show"); }
function closeMenu(){ sideMenu.classList.remove("open"); overlay.classList.remove("show"); }
function goToPage(p){ closeMenu(); window.location.href = p + "?session=" + encodeURIComponent(session); }

// Export to Excel
async function exportExcel() {
    try {
        const res = await fetch(`${API}/export/excel?session=${session}`, {
            headers: { "X-Session": session }
        });
        if (!res.ok) throw new Error("Failed to fetch Excel file");

        const blob = await res.blob();
        const a = document.createElement("a");
        a.href = window.URL.createObjectURL(blob);
        a.download = `SchoolData_${session}.xlsx`;
        a.click();
    } catch (err) {
        alert("Error exporting Excel: " + err.message);
        console.error(err);
    }
}

// Export to Google Sheets
async function exportGoogle() {
    try {
        const res = await fetch(`${API}/export/google-sheet?session=${session}`, {
            headers: { "X-Session": session }
        });
        const data = await res.json();
        if(data.success && data.url){
            window.open(data.url, "_blank");
        } else {
            alert("Google Sheets export failed");
        }
    } catch(err) {
        alert("Error: " + err.message);
        console.error(err);
    }
}
</script>

<script src="shared_menu.js"></script>
</body>
</html>
