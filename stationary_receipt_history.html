<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stationary Receipt History</title>
<style>
  body{font-family:Poppins, sans-serif;background:#f2f4f7;margin:0;padding:0}
  .topbar{width:100%;padding:15px 20px;background:#007bff;color:#fff;display:flex;align-items:center;gap:15px;box-sizing:border-box;position:sticky;top:0;z-index:4000}
  .menu-btn{font-size:28px;cursor:pointer;color:#fff;font-weight:900;}
  #sessionSelect{padding:4px 8px;border-radius:6px;border:none;font-size:14px;}
  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);display:none;z-index:1500;}
  .overlay.show{display:block;}
  .side-menu{position:fixed;top:0;left:-280px;width:260px;height:100%;background:#fff;box-shadow:2px 0 8px rgba(0,0,0,0.18);padding:20px;overflow-y:auto;z-index:2000;transition:left 0.35s;border-radius:0 18px 18px 0;}
  .side-menu.open{left:0;}
  .menu-item{padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;font-size:16px;font-weight:600;color:#333;}

  .container{max-width:1200px;margin:15px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .row > div{flex:1;min-width:220px;}
  select,input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th,td{border:1px solid #e6e6e6;padding:8px;text-align:left;font-size:14px}
  th{background:#007bff;color:#fff}
  .btn{padding:8px 12px;border:0;border-radius:8px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer;}
  .muted{color:#6b7280;font-size:13px;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">&#9776;</div>
    <div style="font-size:20px;font-weight:600;">Stationary Receipt History</div>
    <div style="margin-left:auto; display:flex; align-items:center;">
      <select id="sessionSelect" onchange="changeSession()"></select>
    </div>
  </div>

  <div id="overlay" class="overlay" onclick="closeMenu()"></div>
  <div class="side-menu" id="sideMenu">
    <div class="menu-item" onclick="goToPage('fee_students.html')">Fee Overview</div>
    <div class="menu-item" onclick="goToPage('stationary_students.html')">Home</div>
    <div class="menu-item" onclick="goToPage('stationary_items.html')">Stationary Items</div>
    <div class="menu-item" onclick="goToPage('stationary_receipt_history.html')">Receipt History</div>
    <div class="menu-item" onclick="goToPage('stationary_fee_ledger.html')">Stationary Fee Ledger</div>
  </div>

  <div class="container">
    <div class="row">
      <div>
        <label class="muted">Class (optional)</label>
        <select id="classSelect" onchange="loadReceipts()"></select>
      </div>
      <div>
        <label class="muted">Search</label>
        <input id="search" placeholder="Search by name, receipt no, roll" oninput="renderRows()" />
      </div>
    </div>
    <div class="muted" id="summary"></div>

    <table>
      <thead>
        <tr>
          <th>Receipt No</th>
          <th>Date</th>
          <th>Student</th>
          <th>Class</th>
          <th>Roll</th>
          <th>Items</th>
          <th>Total (&#8377;)</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="rowsBody"></tbody>
    </table>
  </div>

<script>
const FEE_API = localStorage.getItem("apiBaseUrl") || "http://127.0.0.1:5000";
const SESSION_API = localStorage.getItem("sessionApiBaseUrl") || "https://exam-backend-117372286918.asia-south1.run.app/";
let currentSession = localStorage.getItem("session") || "2024_25";
let allRows = [];

function toggleMenu(){ sideMenu.classList.toggle("open"); overlay.classList.toggle("show"); }
function closeMenu(){ sideMenu.classList.remove("open"); overlay.classList.remove("show"); }
function goToPage(p){ window.location.href = p + "?session=" + encodeURIComponent(currentSession); }

async function loadSessions(){
  try{
    const res = await fetch(SESSION_API + "/session/list");
    const data = await res.json();
    const sel = document.getElementById("sessionSelect");
    sel.innerHTML = "";
    const sessions = (data.sessions && data.sessions.length) ? data.sessions : [currentSession];
    sessions.forEach(s=>{
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      if (s === currentSession) opt.selected = true;
      sel.appendChild(opt);
    });
  }catch(e){
    const sel = document.getElementById("sessionSelect");
    sel.innerHTML = `<option>${currentSession}</option>`;
  }
}

function changeSession(){
  currentSession = sessionSelect.value;
  localStorage.setItem("session", currentSession);
  loadReceipts();
}

async function loadReceipts(){
  const cls = classSelect.value || "";
  const url = cls ? `${FEE_API}/stationary/receipts?class=${encodeURIComponent(cls)}` : `${FEE_API}/stationary/receipts`;
  const res = await fetch(url, {headers:{"X-Session": currentSession}});
  const data = await res.json();
  allRows = data.receipts || [];
  buildClassOptions(allRows);
  renderRows();
}

function buildClassOptions(rows){
  const classes = [...new Set(rows.map(r=>r.class_name).filter(Boolean))];
  classes.sort((a,b)=>a.localeCompare(b, undefined, {numeric:true}));
  const current = classSelect.value;
  classSelect.innerHTML = `<option value="">All Classes</option>` + classes.map(c=>`<option value="${c}">${c}</option>`).join("");
  if (current) classSelect.value = current;
}

function renderRows(){
  const q = (search.value || "").toLowerCase();
  const rows = allRows.filter(r=>{
    const s = `${r.student_name||""} ${r.receipt_no||""} ${r.roll||""}`.toLowerCase();
    return s.includes(q);
  });
  summary.textContent = `Total receipts: ${rows.length}`;
  rowsBody.innerHTML = rows.map(r=>{
    const items = (r.items || []).map(it=>`${it.name} x${it.qty}`).join(", ");
    return `<tr>
      <td>${r.receipt_no}</td>
      <td>${r.date || "-"}</td>
      <td>${r.student_name || "-"}</td>
      <td>${r.class_name || "-"}</td>
      <td>${r.roll || "-"}</td>
      <td>${items || "-"}</td>
      <td>${r.total || 0}</td>
      <td>
        <button class="btn" onclick="openReceipt(${r.receipt_no})">View</button>
        <button class="btn" style="background:#ef4444;margin-left:6px" onclick="deleteReceipt(${r.receipt_no})">Delete</button>
      </td>
    </tr>`;
  }).join("");
}

function openReceipt(no){
  const qs = new URLSearchParams({session: currentSession, receipt: String(no)});
  window.location.href = `stationary_receipt.html?${qs.toString()}`;
}

async function deleteReceipt(no){
  if (!confirm(`Delete receipt ${no}?`)) return;
  const res = await fetch(`${FEE_API}/stationary/receipt/${no}`, {
    method: "DELETE",
    headers: {"X-Session": currentSession}
  });
  const data = await res.json();
  if (!res.ok || !data.success) return alert(data.message || "Delete failed");
  loadReceipts();
}

loadSessions();
loadReceipts();
</script>
</body>
</html>
